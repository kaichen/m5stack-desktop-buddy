[env:m5stick-s3]
platform = espressif32
board = m5stack-stamps3
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = no_ota.csv
board_build.f_cpu = 160000000L
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
build_src_filter = +<*> +<buddies/>
lib_deps =
    m5stack/M5Unified @ ^0.2.8
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0

# M5Stack Cardputer ADV — ESP32-S3 + 240x135 landscape display +
# TCA8418 I2C keyboard (no A/B buttons). Selects keyboard shim and
# landscape geometry via -DBUDDY_CARDPUTER_ADV.
[env:cardputer-adv]
extends = env:m5stick-s3
build_flags =
    ${env:m5stick-s3.build_flags}
    -DBUDDY_CARDPUTER_ADV
lib_deps =
    ${env:m5stick-s3.lib_deps}
    m5stack/M5Cardputer @ ^1.1.1
